<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nonogram Pictures</title>
  <style>
    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #cac3b5;
      color: #363431;
      font-family: system-ui, sans-serif;
    }

    body {
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    canvas {
      image-rendering: pixelated;
      max-width: 100vw;
      max-height: 100vh;
      outline: none;
    }

    #status {
      position: fixed;
      left: 16px;
      bottom: 14px;
      font-size: 13px;
      opacity: 0.75;
    }
  </style>
</head>
<body>
  <div id="status">Loading...</div>
  <script src="howler.min.js"></script>
  <script src="wasm_exec.js"></script>
  <script>
    const music = new Howl({
      src: ["audio/tunetank-lounge-jazz-elevator-music-348999.mp3"],
      loop: true,
      volume: 0.35,
      html5: true
    });
    const sfx = {
      pencil: new Howl({
        src: ["audio/u_o8xh7gwsrj-app_interface_click_2-476372.mp3"],
        volume: 0.65
      }),
      eraser: new Howl({
        src: ["audio/audley_fergine-ui-button-click-5-327756.mp3"],
        volume: 0.65
      }),
      correct: new Howl({
        src: ["audio/liecio-menu_beep_accept_soft-533780.mp3"],
        volume: 0.8
      }),
      complete: new Howl({
        src: ["audio/koiroylers-awesome-level-up-351714.mp3"],
        volume: 0.85
      })
    };
    window.setMusicMuted = (muted) => Howler.mute(muted);
    window.playSFX = (name) => {
      const sound = sfx[name];
      if (sound) {
        sound.play();
      }
    };
    window.downloadEditorImage = (filename, raw) => {
      const art = JSON.parse(raw);
      const width = Math.max(1, Number(art.width) || 1);
      const height = Math.max(1, Number(art.height) || 1);
      const scale = 32;
      const canvas = document.createElement("canvas");
      canvas.width = width * scale;
      canvas.height = height * scale;
      const ctx = canvas.getContext("2d");
      ctx.imageSmoothingEnabled = false;
      ctx.fillStyle = "#fffdf4";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      (art.cells || []).forEach((cell, index) => {
        if (!cell || cell.a <= 0) {
          return;
        }
        const x = index % width;
        const y = Math.floor(index / width);
        ctx.fillStyle = `rgb(${cell.r}, ${cell.g}, ${cell.b})`;
        ctx.fillRect(x * scale, y * scale, scale, scale);
      });
      const link = document.createElement("a");
      link.href = canvas.toDataURL("image/jpeg", 0.95);
      link.download = filename || "pixaross-art.jpg";
      document.body.appendChild(link);
      link.click();
      link.remove();
    };
    window.__pendingEditorImageImport = "";
    window.__pendingEditorPackImport = "";
    window.__pendingEditorColor = "";
    window.takeEditorImageImport = () => {
      const raw = window.__pendingEditorImageImport || "";
      window.__pendingEditorImageImport = "";
      return raw;
    };
    window.takeEditorPackImport = () => {
      const raw = window.__pendingEditorPackImport || "";
      window.__pendingEditorPackImport = "";
      return raw;
    };
    window.takeEditorColorPicker = () => {
      const value = window.__pendingEditorColor || "";
      window.__pendingEditorColor = "";
      return value;
    };
    window.requestEditorColorPicker = (initial) => {
      const input = document.createElement("input");
      input.type = "color";
      input.value = /^#[0-9a-f]{6}$/i.test(initial) ? initial : "#485c79";
      input.oninput = () => {
        window.__pendingEditorColor = input.value;
      };
      input.onchange = () => {
        window.__pendingEditorColor = input.value;
      };
      input.click();
    };
    window.requestEditorPackImport = () => {
      const input = document.createElement("input");
      input.type = "file";
      input.accept = "application/json,.json";
      input.onchange = () => {
        const file = input.files && input.files[0];
        if (!file) {
          return;
        }
        file.text().then((text) => {
          window.__pendingEditorPackImport = text;
        }).catch(() => {
          window.__pendingEditorPackImport = "";
        });
      };
      input.click();
    };
    window.requestEditorImageImport = (size) => {
      const input = document.createElement("input");
      input.type = "file";
      input.accept = "image/png,image/jpeg,image/webp,image/gif";
      input.onchange = () => {
        const file = input.files && input.files[0];
        if (!file) {
          return;
        }
        const image = new Image();
        image.onload = () => {
          const tileSize = Math.max(1, Number(size) || 10);
          const canvas = document.createElement("canvas");
          canvas.width = tileSize;
          canvas.height = tileSize;
          const ctx = canvas.getContext("2d", { willReadFrequently: true });
          ctx.imageSmoothingEnabled = true;
          const side = Math.min(image.width, image.height);
          const sx = Math.floor((image.width - side) / 2);
          const sy = Math.floor((image.height - side) / 2);
          ctx.clearRect(0, 0, tileSize, tileSize);
          ctx.drawImage(image, sx, sy, side, side, 0, 0, tileSize, tileSize);
          const data = ctx.getImageData(0, 0, tileSize, tileSize).data;
          const cells = [];
          for (let i = 0; i < data.length; i += 4) {
            cells.push({ r: data[i], g: data[i + 1], b: data[i + 2], a: data[i + 3] });
          }
          window.__pendingEditorImageImport = JSON.stringify({ width: tileSize, height: tileSize, cells });
          URL.revokeObjectURL(image.src);
        };
        image.src = URL.createObjectURL(file);
      };
      input.click();
    };
    window.communityFetchStatus = () => {
      if (!window.SUPABASE_URL || !window.SUPABASE_ANON_KEY) {
        return "Set window.SUPABASE_URL and window.SUPABASE_ANON_KEY to enable live packs.";
      }
      return "Supabase config detected. Pack API wiring is ready for the next backend step.";
    };

    const startMusic = () => {
      if (!music.playing()) {
        music.play();
      }
      window.removeEventListener("pointerdown", startMusic);
      window.removeEventListener("keydown", startMusic);
    };
    window.addEventListener("pointerdown", startMusic, { once: true });
    window.addEventListener("keydown", startMusic, { once: true });

    const dev = ["localhost", "127.0.0.1"].includes(window.location.hostname);
    const wasmPath = "game.wasm";

    const go = new Go();
    WebAssembly.instantiateStreaming(fetch(wasmPath), go.importObject).then((result) => {
      document.getElementById("status").remove();
      go.run(result.instance);
    }).catch((err) => {
      document.getElementById("status").textContent = err;
      console.error(err);
    });

    if (dev) {
      fetch("/_wait").then((res) => {
        if (res.ok) {
          window.location.reload();
        }
      }).catch(() => {
        // Dev-only reload waiting should never interrupt gameplay.
      });
    }
  </script>
</body>
</html>
